appId: com.lyra.ide
productName: Lyra
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - node_modules/node-pty/**/*
asar: true
asarUnpack:
  - node_modules/node-pty/**/*
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: null
  entitlementsInherit: null
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
  category: Development
